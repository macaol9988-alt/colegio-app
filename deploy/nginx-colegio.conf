# ============================================================
# Configuracao Nginx para o Sistema do Colegio
# ============================================================
# Coloque em: /etc/nginx/sites-available/colegio
# Ative com:   sudo ln -s /etc/nginx/sites-available/colegio /etc/nginx/sites-enabled/
# Teste:       sudo nginx -t
# Recarregue:  sudo systemctl reload nginx
#
# Depois, gere o SSL com:
#   sudo certbot --nginx -d SEU-DOMINIO -d www.SEU-DOMINIO
# (o Certbot edita este arquivo automaticamente)
# ============================================================

# Redireciona HTTP -> HTTPS (depois que o Certbot for executado, ele
# adiciona/edita os blocos de HTTPS - este bloco inicial e suficiente
# para o Certbot validar e gerar o certificado).

server {
    listen 80;
    listen [::]:80;
    server_name SEU-DOMINIO www.SEU-DOMINIO;

    # Limita o tamanho de upload (logos, fotos, anexos de chamados)
    client_max_body_size 10M;

    # Buffer grande o suficiente para JSON dos chamados
    client_body_buffer_size 256k;

    # Compressao gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Headers de seguranca
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy para o app Node.js rodando na porta 3001 (PM2)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Logs especificos do app
    access_log /var/log/nginx/colegio.access.log;
    error_log  /var/log/nginx/colegio.error.log warn;
}
