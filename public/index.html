<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6c5ce7" />
    <title>Sistema do Colégio</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%236c5ce7'/%3E%3Cstop offset='1' stop-color='%23fd79a8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='66' font-family='Arial' font-size='52' font-weight='800' fill='white' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles/theme.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/modules.css" />
  </head>
  <body>
    <!-- =================== AUTH (login / cadastro / ativacao) =================== -->
    <section class="auth-shell" id="authView">
      <div class="auth-card" id="authCard">
        <div class="brand-mark" id="authBrand">C</div>
        <h1 id="authTitle">Entrar</h1>
        <p class="auth-sub" id="authSubtitle">Acesse o sistema do colégio</p>

        <!-- LOGIN -->
        <form id="loginForm" class="stack">
          <div class="auth-switch">
            <button type="button" class="active" data-identity="email">E-mail</button>
            <button type="button" data-identity="cpf">CPF</button>
          </div>
          <div class="field">
            <label for="loginIdentifier" id="loginIdentifierLabel">E-mail</label>
            <input class="input" id="loginIdentifier" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="loginPassword">Senha</label>
            <div class="input-group">
              <input class="input" id="loginPassword" type="password" autocomplete="current-password" required />
              <button type="button" class="input-action" data-toggle-password="loginPassword" aria-label="Mostrar senha">
                <span class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></span>
              </button>
            </div>
          </div>
          <button class="btn primary block lg" type="submit">Entrar</button>
          <button type="button" class="auth-link" data-goto="forgot">Esqueci minha senha</button>
          <button type="button" class="auth-link" data-goto="register">Criar uma conta</button>
        </form>

        <!-- REGISTER -->
        <form id="registerForm" class="stack hidden">
          <div class="field">
            <label for="regName">Nome completo</label>
            <input class="input" id="regName" type="text" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="regEmail">E-mail</label>
            <input class="input" id="regEmail" type="email" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="regCpf">CPF</label>
            <input class="input" id="regCpf" type="text" inputmode="numeric" required maxlength="14" />
          </div>
          <div class="field">
            <label for="regPhone">Telefone (opcional)</label>
            <input class="input" id="regPhone" type="tel" autocomplete="tel" />
          </div>
          <div class="field">
            <label for="regPassword">Senha</label>
            <input class="input" id="regPassword" type="password" minlength="6" required autocomplete="new-password" />
          </div>
          <button class="btn primary block lg" type="submit">Criar conta</button>
          <button type="button" class="auth-link" data-goto="login">Já tenho conta</button>
        </form>

        <!-- FORGOT -->
        <form id="forgotForm" class="stack hidden">
          <p class="subtitle center">Informe seu e-mail ou CPF cadastrado e enviaremos um link.</p>
          <div class="field">
            <label for="forgotIdentifier">E-mail ou CPF</label>
            <input class="input" id="forgotIdentifier" type="text" required />
          </div>
          <button class="btn primary block lg" type="submit">Enviar link</button>
          <button type="button" class="auth-link" data-goto="login">Voltar ao login</button>
        </form>

        <!-- RESET PASSWORD -->
        <form id="resetForm" class="stack hidden">
          <p class="subtitle center">Defina sua nova senha.</p>
          <div class="field">
            <label for="resetPassword">Nova senha</label>
            <input class="input" id="resetPassword" type="password" minlength="6" required />
          </div>
          <div class="field">
            <label for="resetConfirm">Confirmar senha</label>
            <input class="input" id="resetConfirm" type="password" minlength="6" required />
          </div>
          <button class="btn primary block lg" type="submit">Salvar nova senha</button>
        </form>

        <!-- ACTIVATING -->
        <div id="activatingMsg" class="stack hidden center">
          <div class="loader" style="margin: 0 auto;"></div>
          <p class="subtitle">Validando ativação...</p>
        </div>

        <!-- SUCCESS / INFO MESSAGES -->
        <div id="authMessage" class="hidden">
          <div class="neu-card flat center stack" style="gap: 10px;">
            <p id="authMessageText"></p>
            <button type="button" class="btn primary" data-goto="login">Ir para o login</button>
          </div>
        </div>
      </div>
    </section>

    <!-- =================== APP SHELL (logado) =================== -->
    <section class="app-shell hidden" id="appShell">
      <aside class="sidebar">
        <div class="brand">
          <img id="brandLogo" alt="Logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%236c5ce7'/%3E%3Cstop offset='1' stop-color='%23fd79a8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='66' font-family='Arial' font-size='52' font-weight='800' fill='white' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E" />
          <div>
            <div class="brand-name" id="brandName">Colégio</div>
            <div class="brand-sub">Sistema</div>
          </div>
        </div>
        <nav class="nav-group" id="navMain"></nav>
        <div class="user-card">
          <div class="avatar" id="userAvatar">U</div>
          <div class="info">
            <strong id="userName">Usuario</strong>
            <span id="userRole">Perfil</span>
          </div>
          <button class="logout" id="logoutBtn" title="Sair">
            <span class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
          </button>
        </div>
      </aside>

      <header class="mobile-header">
        <div class="brand">
          <img id="brandLogoMobile" alt="" src="" />
          <strong id="brandNameMobile">Colégio</strong>
        </div>
        <button class="btn icon ghost" id="logoutBtnMobile" title="Sair">
          <span class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        </button>
      </header>

      <header class="topbar">
        <div>
          <p class="eyebrow" id="topbarEyebrow">Painel</p>
          <h1 id="topbarTitle">Dashboard</h1>
        </div>
        <div class="row gap-md">
          <div class="clock">
            <span id="currentDate">--</span>
            <strong id="currentTime">--:--</strong>
          </div>
        </div>
      </header>

      <main class="content" id="content">
        <!-- views injetadas dinamicamente -->
      </main>

      <nav class="bottom-nav" id="bottomNav"></nav>
      <button class="fab hidden" id="fabPrimary" aria-label="Novo">
        <span class="icon-wrap"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
      </button>
    </section>

    <!-- Modal generico -->
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" id="modal">
        <div class="modal-header">
          <div>
            <p class="eyebrow" id="modalEyebrow"></p>
            <h2 id="modalTitle"></h2>
          </div>
          <button class="modal-close" id="modalClose" aria-label="Fechar">
            <span class="icon-wrap"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
          </button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/scripts/icons.js"></script>
    <script src="/scripts/api.js"></script>
    <script src="/scripts/utils.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/views/dashboard.js"></script>
    <script src="/scripts/views/attendance.js"></script>
    <script src="/scripts/views/tickets.js"></script>
    <script src="/scripts/views/admin.js"></script>
    <script src="/scripts/app.js"></script>
  </body>
</html>
